<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odara — Pesquisa de Cultura</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
:root{
  --y:#FFB81D;--r:#EE2737;--c:#FFF8EA;--p:#0C0C0C;--g:#565555;
}
body{font-family:'Barlow',sans-serif;background:var(--c);color:var(--p);min-height:100vh;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--p);border-bottom:2px solid rgba(255,184,29,.18);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;gap:12px;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{font-family:'Barlow',sans-serif;font-size:16px;font-weight:900;letter-spacing:3px;color:#fff;text-transform:uppercase;}
.hdr-logo span{color:var(--y);}
.hdr-tag{background:rgba(255,184,29,.15);border:1px solid rgba(255,184,29,.3);color:var(--y);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:2px;}
.hdr-actions{display:flex;align-items:center;gap:10px;}
.btn-back{color:#565555;font-size:11px;font-weight:500;text-decoration:none;transition:color .2s;}
.btn-back:hover{color:var(--y);}
.btn-save{background:none;border:1px solid rgba(255,184,29,.28);color:rgba(255,255,255,.45);font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;border-radius:2px;cursor:pointer;transition:all .2s;}
.btn-save:hover{border-color:var(--y);color:var(--y);}

/* Progress */
.prog-wrap{display:flex;align-items:center;gap:10px;padding:0 28px 10px;}
.prog-track{flex:1;height:3px;background:rgba(255,184,29,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--y),#FFC94D);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%;}
.prog-label{font-size:10px;color:#565555;white-space:nowrap;font-weight:500;}

/* MAIN */
.main{max-width:700px;margin:0 auto;padding:36px 20px 80px;}

/* Section header */
.sec-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(12,12,12,.07);}
.sec-num{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:700;color:var(--y);opacity:.22;line-height:1;flex-shrink:0;letter-spacing:-2px;}
.sec-name{font-size:19px;font-weight:700;color:var(--p);margin-bottom:4px;}
.sec-desc{font-size:12px;color:var(--g);line-height:1.55;}

/* QUESTION CARDS */
.q-card{background:#fff;border:1.5px solid rgba(12,12,12,.08);border-radius:5px;padding:18px 20px;margin-bottom:12px;transition:border-color .2s;animation:slideIn .22s ease forwards;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.q-card:hover{border-color:rgba(255,184,29,.28);}
.q-card.answered{border-left:3px solid var(--y);}
.q-card.req-error{border-color:var(--r);background:rgba(238,39,55,.02);}

.q-id{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--g);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.q-badge{background:rgba(255,184,29,.15);color:#A07010;font-size:8px;padding:2px 6px;border-radius:2px;font-weight:700;}
.q-text{font-size:14px;font-weight:500;color:var(--p);line-height:1.6;margin-bottom:16px;}
.q-req{color:var(--r);margin-left:2px;}

/* LIKERT — 5 colunas perfeitas, menor */
.likert-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:420px;}
.l-opt{display:flex;flex-direction:column;align-items:center;gap:5px;}
.l-btn{
  width:100%;aspect-ratio:1;min-width:0;
  border:1.5px solid rgba(12,12,12,.11);
  border-radius:4px;background:var(--c);
  font-family:'Barlow',sans-serif;font-size:15px;font-weight:700;
  color:var(--g);cursor:pointer;transition:all .14s;
  display:flex;align-items:center;justify-content:center;
}
.l-btn:hover{border-color:var(--y);color:var(--p);background:rgba(255,184,29,.07);}
.l-btn.sel{background:var(--p);border-color:var(--p);color:var(--y);box-shadow:0 2px 10px rgba(12,12,12,.18);}
.l-lbl{font-size:8px;font-weight:500;color:var(--g);text-align:center;max-width:52px;line-height:1.25;text-transform:uppercase;letter-spacing:.2px;}

/* SELECT */
.f-select{width:100%;padding:11px 14px;border:1.5px solid rgba(12,12,12,.11);border-radius:4px;background:var(--c);font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;color:var(--p);appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='11' height='7' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4.5 4.5L10 1' stroke='%23565555' stroke-width='1.6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px;cursor:pointer;transition:border-color .2s;}
.f-select:focus{outline:none;border-color:var(--y);}

/* TEXT */
.f-text{width:100%;padding:11px 14px;border:1.5px solid rgba(12,12,12,.11);border-radius:4px;background:var(--c);font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;color:var(--p);transition:border-color .2s;}
.f-text:focus{outline:none;border-color:var(--y);}

/* TEXTAREA */
.f-textarea{width:100%;padding:12px 14px;border:1.5px solid rgba(12,12,12,.11);border-radius:4px;background:var(--c);font-family:'Barlow',sans-serif;font-size:13px;color:var(--p);resize:vertical;min-height:88px;line-height:1.65;transition:border-color .2s;}
.f-textarea:focus{outline:none;border-color:var(--y);}
.char-ct{text-align:right;font-size:10px;color:var(--g);margin-top:3px;}

/* NAV */
.survey-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(12,12,12,.07);}
.btn-prev{background:none;border:1.5px solid rgba(12,12,12,.13);color:var(--g);font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:12px 24px;border-radius:2px;cursor:pointer;transition:all .2s;}
.btn-prev:hover{border-color:var(--p);color:var(--p);}
.btn-next{background:var(--p);color:var(--y);border:2px solid var(--p);font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 32px;border-radius:2px;cursor:pointer;transition:all .2s;}
.btn-next:hover{background:var(--y);color:var(--p);border-color:var(--y);transform:translateY(-1px);box-shadow:0 5px 18px rgba(255,184,29,.28);}

/* OBRIGADO */
.thanks{min-height:100vh;background:var(--p);display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.thanks-card{text-align:center;max-width:480px;}
.thanks-icon{width:68px;height:68px;background:rgba(255,184,29,.12);border:2px solid rgba(255,184,29,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 24px;}
.thanks-title{font-family:'Barlow',sans-serif;font-size:28px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:6px;}
.thanks-title span{color:var(--y);}
.thanks-desc{font-size:13px;color:#565555;line-height:1.75;margin-bottom:28px;}
.thanks-prazo{background:rgba(255,184,29,.06);border:1px solid rgba(255,184,29,.18);border-radius:3px;padding:14px 18px;margin-bottom:28px;font-size:12px;color:rgba(255,255,255,.5);}
.thanks-prazo strong{color:var(--y);}
.btn-back-home{background:var(--y);color:var(--p);font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:13px 28px;border-radius:2px;text-decoration:none;display:inline-block;transition:all .2s;}
.btn-back-home:hover{background:#FFC94D;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--p);color:var(--y);padding:10px 22px;border-radius:2px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none;border:1px solid rgba(255,184,29,.28);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:580px){
  .hdr-top{padding:10px 14px;}
  .prog-wrap{padding:0 14px 8px;}
  .main{padding:24px 12px 64px;}
  .survey-nav{flex-direction:column-reverse;gap:8px;}
  .btn-prev,.btn-next{width:100%;text-align:center;}
}
</style>
</head>
<body>

<!-- SURVEY VIEW -->
<div id="view-survey" style="display:none;">
  <header class="hdr">
    <div class="hdr-top">
      <div class="hdr-brand">
        <span class="hdr-logo">ODARA<span>.</span></span>
        <span class="hdr-tag" id="survey-tag"></span>
      </div>
      <div class="hdr-actions">
        <a href="index.html" class="btn-back">← Voltar</a>
        <button class="btn-save" onclick="savePartial()">💾 Salvar progresso</button>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <span class="prog-label" id="prog-label">Seção 1 de —</span>
    </div>
  </header>

  <div class="main">
    <div class="sec-hdr">
      <div class="sec-num" id="sec-num">01</div>
      <div>
        <div class="sec-name" id="sec-name"></div>
        <div class="sec-desc" id="sec-desc"></div>
      </div>
    </div>
    <div id="questions-container"></div>
    <div class="survey-nav">
      <button class="btn-prev" id="btn-prev" onclick="prevSection()" style="display:none">← Anterior</button>
      <button class="btn-next" id="btn-next" onclick="nextSection()">Próximo →</button>
    </div>
  </div>
</div>

<!-- OBRIGADO VIEW -->
<div id="view-thanks" class="thanks" style="display:none;">
  <div class="thanks-card">
    <div class="thanks-icon">✅</div>
    <h2 class="thanks-title">Obrigado pela<br><span>contribuição!</span></h2>
    <p class="thanks-desc">Suas respostas foram registradas com sucesso e farão parte da análise de cultura de segurança e qualidade da Odara, alinhada à FSSC 22000 v6.</p>
    <div class="thanks-prazo">
      📅 Os resultados serão divulgados às equipes até <strong>30 de abril de 2025</strong>.
    </div>
    <a href="index.html" class="btn-back-home">← Voltar ao início</a>
  </div>
</div>

<script src="survey-data.js"></script>
<script>
/* ── Estado ── */
let surveyType=null,survey=null,secIdx=0,responses={};
let respondentId='r_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();

const LIKERT_LABELS={1:'Discordo totalmente',2:'Discordo',3:'Neutro',4:'Concordo',5:'Concordo totalmente'};

/* ── Init ── */
document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(window.location.search);
  const t=p.get('type');
  if(!t||!SURVEY_DATA[t]){window.location.href='index.html';return;}

  const saved=localStorage.getItem('odara_session_'+t);
  if(saved){
    const s=JSON.parse(saved);
    if(confirm('Você tem progresso salvo. Continuar de onde parou?')){
      responses=s.responses; secIdx=s.secIdx; respondentId=s.respondentId;
    } else { localStorage.removeItem('odara_session_'+t); }
  }
  startSurvey(t);
});

function startSurvey(t){
  surveyType=t; survey=SURVEY_DATA[t];
  document.getElementById('survey-tag').textContent=survey.tag;
  document.getElementById('view-survey').style.display='block';
  renderSection();
}

/* ── Render ── */
function renderSection(){
  const secs=survey.sections, sec=secs[secIdx];
  document.getElementById('sec-num').textContent=String(secIdx+1).padStart(2,'0');
  document.getElementById('sec-name').textContent=sec.title;
  document.getElementById('sec-desc').textContent=sec.desc||'';
  const pct=Math.round((secIdx/secs.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`Seção ${secIdx+1} de ${secs.length}`;
  document.getElementById('btn-prev').style.display=secIdx>0?'inline-block':'none';
  const isLast=secIdx===secs.length-1;
  document.getElementById('btn-next').textContent=isLast?'Enviar pesquisa ✓':'Próximo →';
  const c=document.getElementById('questions-container');
  c.innerHTML='';
  sec.questions.forEach(q=>c.appendChild(buildCard(q)));
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildCard(q){
  const card=document.createElement('div');
  const answered=responses[q.id]!==undefined&&responses[q.id]!=='';
  card.className='q-card'+(answered?' answered':'');
  card.id='card-'+q.id;
  let h=`<div class="q-id">${q.id}${q.badge?` <span class="q-badge">${q.badge}</span>`:''}</div>`;
  h+=`<div class="q-text">${q.text}${q.required?'<span class="q-req">*</span>':''}</div>`;
  switch(q.type){
    case 'likert':   h+=buildLikert(q); break;
    case 'select':   h+=buildSelect(q); break;
    case 'text':     h+=buildTextInput(q); break;
    case 'textarea': h+=buildTextarea(q); break;
  }
  card.innerHTML=h;
  setTimeout(()=>bindEvents(q,card),0);
  return card;
}

function buildLikert(q){
  const val=responses[q.id];
  let h='<div class="likert-wrap">';
  [1,2,3,4,5].forEach(n=>{
    h+=`<div class="l-opt">
      <button class="l-btn${val==n?' sel':''}" data-qid="${q.id}" data-val="${n}">${n}</button>
      <span class="l-lbl">${LIKERT_LABELS[n]}</span>
    </div>`;
  });
  return h+'</div>';
}

function buildSelect(q){
  const val=responses[q.id]||'';
  let h=`<select class="f-select" id="sel-${q.id}" data-qid="${q.id}"><option value="">Selecione...</option>`;
  q.options.forEach(o=>h+=`<option value="${o}"${val===o?' selected':''}>${o}</option>`);
  return h+'</select>';
}

function buildTextInput(q){
  return `<input type="text" class="f-text" id="txt-${q.id}" data-qid="${q.id}" value="${responses[q.id]||''}" placeholder="${q.placeholder||''}">`;
}

function buildTextarea(q){
  const val=responses[q.id]||'';
  return `<textarea class="f-textarea" id="ta-${q.id}" data-qid="${q.id}" maxlength="500" placeholder="${q.placeholder||'Sua resposta...'}">${val}</textarea>
  <div class="char-ct" id="cc-${q.id}">${val.length}/500</div>`;
}

function bindEvents(q,card){
  if(q.type==='likert'){
    card.querySelectorAll('.l-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        responses[q.id]=parseInt(btn.dataset.val);
        card.querySelectorAll('.l-btn').forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
        card.classList.add('answered'); card.classList.remove('req-error');
        autoSave();
      });
    });
  }
  if(q.type==='select'){
    const el=card.querySelector('#sel-'+q.id);
    if(el) el.addEventListener('change',()=>{responses[q.id]=el.value;card.classList.toggle('answered',!!el.value);card.classList.remove('req-error');autoSave();});
  }
  if(q.type==='text'){
    const el=card.querySelector('#txt-'+q.id);
    if(el) el.addEventListener('input',()=>{responses[q.id]=el.value;card.classList.toggle('answered',!!el.value.trim());autoSave();});
  }
  if(q.type==='textarea'){
    const el=card.querySelector('#ta-'+q.id);
    const cc=card.querySelector('#cc-'+q.id);
    if(el) el.addEventListener('input',()=>{responses[q.id]=el.value;if(cc)cc.textContent=el.value.length+'/500';card.classList.toggle('answered',!!el.value.trim());autoSave();});
  }
}

/* ── Validação ── */
function validate(){
  const sec=survey.sections[secIdx];
  let ok=true,first=null;
  sec.questions.forEach(q=>{
    if(!q.required)return;
    const empty=responses[q.id]===undefined||responses[q.id]==='';
    const card=document.getElementById('card-'+q.id);
    if(empty){ok=false;card.classList.add('req-error');if(!first)first=card;}
    else card.classList.remove('req-error');
  });
  if(!ok&&first){first.scrollIntoView({behavior:'smooth',block:'center'});showToast('⚠️ Preencha as perguntas obrigatórias (*)');}
  return ok;
}

/* ── Nav ── */
function nextSection(){
  if(!validate())return;
  if(secIdx<survey.sections.length-1){secIdx++;renderSection();}
  else submitSurvey();
}
function prevSection(){if(secIdx>0){secIdx--;renderSection();}}

/* ── Submit ── */
async function submitSurvey(){
  document.getElementById('prog-fill').style.width='100%';
  const payload={respondent_id:respondentId,survey_id:survey.id,survey_type:surveyType,submitted_at:new Date().toISOString(),responses};
  saveToLocal(payload);
  await sendToSupabase(payload);
  localStorage.removeItem('odara_session_'+surveyType);
  document.getElementById('view-survey').style.display='none';
  document.getElementById('view-thanks').style.display='flex';
}

async function sendToSupabase(p){
  const U=window.SUPABASE_URL||'',K=window.SUPABASE_ANON_KEY||'';
  if(!U||!K)return false;
  try{
    await fetch(`${U}/rest/v1/respondents`,{method:'POST',headers:{'Content-Type':'application/json','apikey':K,'Authorization':'Bearer '+K,'Prefer':'return=minimal'},body:JSON.stringify({id:p.respondent_id,survey_type:p.survey_type,survey_id:p.survey_id,submitted_at:p.submitted_at})});
    const rows=Object.entries(p.responses).map(([qid,val])=>({respondent_id:p.respondent_id,question_id:qid,value:String(val),survey_type:p.survey_type,created_at:p.submitted_at}));
    await fetch(`${U}/rest/v1/responses`,{method:'POST',headers:{'Content-Type':'application/json','apikey':K,'Authorization':'Bearer '+K,'Prefer':'return=minimal'},body:JSON.stringify(rows)});
    return true;
  }catch(e){return false;}
}

function saveToLocal(p){const k='odara_responses';const e=JSON.parse(localStorage.getItem(k)||'[]');e.push(p);localStorage.setItem(k,JSON.stringify(e));}
function autoSave(){localStorage.setItem('odara_session_'+surveyType,JSON.stringify({responses,secIdx,respondentId,savedAt:new Date().toISOString()}));}
function savePartial(){autoSave();showToast('✅ Progresso salvo! Continue depois neste dispositivo.');}

function showToast(msg){
  let t=document.getElementById('odara-toast');
  if(!t){t=document.createElement('div');t.id='odara-toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

window.nextSection=nextSection;
window.prevSection=prevSection;
window.savePartial=savePartial;
</script>
</body>
</html>
